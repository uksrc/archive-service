%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=update

quarkus.hibernate-orm.database.generation.create-schemas=true
quarkus.hibernate-orm.database.generation.halt-on-error=false
quarkus.hibernate-orm.quote-identifiers.strategy=all
jakarta.persistence.create-database-schemas=true

# Quiet down the schema management logs (used to suppress warnings about missing tables)
quarkus.log.category."org.hibernate.tool.schema".level=ERROR

# Error logging
#quarkus.log.level=DEBUG
#quarkus.log.console.enable=true
#quarkus.naming.enable-jndi=true
#quarkus.log.category."org.uksrc.archive.utils".level=DEBUG

app.root.path = /archive
quarkus.http.root-path=${app.root.path}

# NOTE: DEV only - fixed port (jdbc url actually) required for TAP service
# Only added to stop random port allocation of postgres container each time the application starts
quarkus.datasource.devservices.enabled=true
quarkus.datasource.devservices.port=5432
quarkus.datasource.devservices.image-name=images.dev.uksrc.org/library/postgres-pgsphere14:latest

quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus
#quarkus.datasource.jdbc.max-size=20
%dev.quarkus.datasource.username=quarkus
%dev.quarkus.datasource.password=quarkus

%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus
%test.quarkus.datasource.username=quarkus
%test.quarkus.datasource.password=quarkus

%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}

#%kubernetes.quarkus.datasource.jdbc.url=${DB_URL}
#%kubernetes.quarkus.datasource.username=${DB_USERNAME}
#%kubernetes.quarkus.datasource.password=${DB_PASSWORD}
#quarkus.kubernetes.namespace=archive-service

#Kubernetes
quarkus.container-image.builder=docker
quarkus.container-image.name=archive-service
quarkus.container-image.registry=images.dev.uksrc.org
quarkus.container-image.group=library
quarkus.container-image.tag=latest

# pull-policy never for local (minikube etc.) auto-deployment
quarkus.kubernetes.image-pull-policy=Never
%prod.quarkus.kubernetes.image-pull-policy=Always
quarkus.container-image.push=false

#Change this for deployment at build time (could do with a k8s specific build so it will always build even if a docker service isn't running).
quarkus.kubernetes.deploy=false

#Change this for deployment at build time.
quarkus.container-image.build=false

#RBAC for reading secrets
#%prod.quarkus.kubernetes.deployment-target=kubernetes
#%prod.quarkus.kubernetes.service-account=archive-service

quarkus.hibernate-orm.*.log.sql=true

# ------------------------------------- Authentication ordering ---------------------------------
#NOTE: leave as false to force quarkus to evaluate the path for the auth type before enforcing one of them.
quarkus.http.auth.proactive=false

# No Auth for public
quarkus.http.auth.permission.public.paths=/,/tap/*,/datalink/*
quarkus.http.auth.permission.public.policy=permit

# Basic Auth for /admin
quarkus.http.auth.permission.admin.paths=/admin,/admin/*
quarkus.http.auth.permission.admin.policy=authenticated
quarkus.http.auth.permission.admin.auth-mechanism=basic

# Observations endpoint (OIDC auth)
quarkus.http.auth.permission.observations.paths=/observations/*,/collections/*
quarkus.http.auth.permission.observations.policy=authenticated
quarkus.http.auth.permission.observations.auth-mechanism=oidc

# Disable security in test mode where required
# Due to certain unit tests using direct HTTP calls, tokens cannot be generated
%test.quarkus.http.auth.permission.collections.paths=/collections,/collections/*
%test.quarkus.http.auth.permission.collections.policy=permit
%test.quarkus.http.auth.permission.search.paths=/search,/search/*
%test.quarkus.http.auth.permission.search.policy=permit

# --------------------------------- Authentication setup ----------------------------------------

# OIDC Details
# Trailing '/' important for token validation
quarkus.oidc.token.issuer=https://ska-iam.stfc.ac.uk/

%dev.quarkus.oidc.auth-server-url=https://ska-iam.stfc.ac.uk
%test.quarkus.oidc.auth-server-url=https://ska-iam.stfc.ac.uk
%test.quarkus.oidc.client-id=dummy-client
%test.quarkus.oidc.credentials.secret=dummy-secret
quarkus.oidc.auth-server-url=${OIDC_SERVER_URL}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:dummy-client}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:dummy-secret}
quarkus.oidc.application-type=service
quarkus.oidc.roles.source=accesstoken
#quarkus.oidc.groups-claim=groups
quarkus.oidc.roles.role-claim-path=groups

# Value MUST match the aud property in the token
quarkus.oidc.token.audience=authn-api

%dev.quarkus.log.category."io.quarkus.oidc".level=DEBUG
# Only required when generating bearer tokens locally in dev mode
%dev.authentication.callback=http://localhost:8080${app.root.path}/auth-callback
%test.authentication.callback=http://localhost:8080${app.root.path}/auth-callback
%prod.authentication.callback=${OIDC_AUTH_CALLBACK}

# Custom IAM settings
# OIDC/IAM is disabled in Dev mode by default for convenience, enable if testing IAM
dev.enable.oidc=false

%dev.security.roles.enabled=${dev.enable.oidc}
%test.security.roles.enabled=true
%prod.security.roles.enabled=true

#Main OIDC enabler (ability to test offline if set to false)
quarkus.http.auth.basic=true
%dev.quarkus.oidc.enabled=${dev.enable.oidc}

#quarkus.hibernate-orm.enable-lazy-load-no-trans=true

# Details of IAM groups that allow access to resources
resource.roles.view=UKSRC/archive-service/viewer,UKSRC/archive-service/maintainer,UKSRC/archive-service/admin
resource.roles.edit=UKSRC/archive-service/maintainer,UKSRC/archive-service/admin
# Reserved for future requirements
#resource.roles.admin=UKSRC/archive-service/admin

#Basic Auth for admin user
%dev.basic.auth.admin.username=admin
%test.basic.auth.admin.username=admin
%prod.basic.auth.admin.username=${ADMIN_USER}
%dev.basic.auth.admin.password=aReallyLongPasswordForTestingOnly
%test.basic.auth.admin.password=aReallyLongPasswordForTestingOnly
%prod.basic.auth.admin.password=${ADMIN_PASSWORD}

# --------------------------------- Production setup --------------------------------------------

# Change depending on deployment destination
%prod.quarkus.kubernetes-config.enabled=true
%prod.quarkus.kubernetes-config.secrets.enabled=true
%prod.quarkus.kubernetes-config.secrets=archive-service-secret
%prod.quarkus.kubernetes.env.secrets=archive-service-secret

# ----------------------------------- TAP Service -----------------------------------------------

#For dev and "normal" mode - path will be created under java.io.tmpdir
vollt.tap.config.path=/archive-service/config
%dev.vollt.tap.config.path=/archive-service/config
%test.vollt.tap.config.path=/archive-service/config/test
#Fixed path for production
%prod.vollt.tap.config.path=/deployments/config

# ----------------------------------- Datalink --------------------------------------------------

#Hardcoding URLs to avoid proxy issues
%dev.datalink.service.hostpath=http://localhost:8080${app.root.path}/datalink/resource
%test.datalink.service.hostpath=http://localhost:8080${app.root.path}/datalink/resource
%prod.datalink.service.hostpath=${DATALINK_HOST_PATH}

# ----------------------------------- Test data seeding -----------------------------------------
testdata.seed.enabled=true
#Don't seed test data in test mode
%test.testdata.seed.enabled=false
#Disable data seeding for production, disabled at the moment for test deployments, update when required
#%prod.testdata.seed.enabled=false
